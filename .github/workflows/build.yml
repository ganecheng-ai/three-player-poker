name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: three-player-poker-linux
            output_name: three-player-poker-linux.tar.gz
          - os: windows-latest
            artifact_name: three-player-poker-windows
            output_name: three-player-poker-windows.zip
          - os: macos-latest
            artifact_name: three-player-poker-macos
            output_name: three-player-poker-macos.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Build with PyInstaller
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            # macOS 生成 .app 包
            pyinstaller --windowed --name "Three Player Poker" src/main.py
          else
            pyinstaller --onefile --name three-player-poker --windowed src/main.py
          fi
        shell: bash

      - name: Prepare artifacts
        run: |
          mkdir -p dist_release
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp dist/three-player-poker.exe dist_release/
          elif [ "$RUNNER_OS" == "macOS" ]; then
            cp -r "dist/Three Player Poker.app" dist_release/
          else
            cp dist/three-player-poker dist_release/
          fi
        shell: bash

      - name: Create archive
        run: |
          cd dist_release
          if [ "$RUNNER_OS" == "Linux" ]; then
            tar -czvf ../${{ matrix.output_name }} *
          elif [ "$RUNNER_OS" == "macOS" ]; then
            # 创建 tar.gz
            tar -czvf ../${{ matrix.artifact_name }}.tar.gz *
            # 如果 create-dmg 可用，创建 dmg
            if command -v create-dmg &> /dev/null; then
              create-dmg \
                --volname "Three Player Poker" \
                --window-pos 200 120 \
                --window-size 800 400 \
                --icon-size 100 \
                --app-drop-link 600 185 \
                --hide-extension "Three Player Poker.app" \
                ../${{ matrix.artifact_name }}.dmg \
                "Three Player Poker.app" || true
            fi
          elif [ "$RUNNER_OS" == "Windows" ]; then
            # Windows 使用 Powershell 压缩
            powershell -Command "Compress-Archive -Path * -DestinationPath ../${{ matrix.output_name }}"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cd artifacts
          # Linux - 如果 artifact 是目录则压缩
          if [ -d "three-player-poker-linux" ]; then
            tar -czvf three-player-poker-linux.tar.gz -C three-player-poker-linux .
          fi
          # macOS - 优先使用 dmg，如果没有则使用 tar.gz
          if [ ! -f "three-player-poker-macos.dmg" ] && [ -d "three-player-poker-macos" ]; then
            tar -czvf three-player-poker-macos.tar.gz -C three-player-poker-macos .
          fi
          # Windows - artifact 已经是 zip 文件，无需重新压缩
          if [ -d "three-player-poker-windows" ]; then
            zip -r three-player-poker-windows.zip three-player-poker-windows/*
          fi
          # 列出所有生成的文件
          echo "Release files:"
          ls -la *.tar.gz *.zip *.dmg 2>/dev/null || echo "No release files found"

      - name: Generate checksums
        run: |
          cd artifacts
          # 生成存在的文件的 checksums
          > checksums.txt
          for file in *.tar.gz *.zip *.dmg; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> checksums.txt
            fi
          done
          echo "Checksums:"
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/three-player-poker-linux.tar.gz
            artifacts/three-player-poker-macos.tar.gz
            artifacts/three-player-poker-macos.dmg
            artifacts/three-player-poker-windows.zip
            artifacts/checksums.txt
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
